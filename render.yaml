services:
  - type: web
    name: sentinel-backend-fastapi
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: "<SET_IN_RENDER_DASHBOARD>"
      - key: GEMINI_API_KEY
        value: "<SET_IN_RENDER_DASHBOARD>"
      - key: OPENAI_API_KEY
        value: "<SET_IN_RENDER_DASHBOARD>"
      - key: USE_LLM_EXTRACTION
        value: "true"
      - key: DEFAULT_CITY
        value: "Bengaluru"
      - key: DEFAULT_STATE
        value: "Karnataka"
      - key: DEFAULT_COUNTRY
        value: "India"

  - type: web
    name: sentinel-final-endpoints
    env: python
    rootDir: final_endpoints
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn models:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: BACKEND_API_URL
        value: "<SET_IN_RENDER_DASHBOARD_AFTER_DEPLOYING_FASTAPI>"
      - key: DATABASE_URL
        value: "<SET_IN_RENDER_DASHBOARD>"
    disk:
      name: resources-db-disk
      mountPath: "/opt/render/project/src/Resource Intelligence and Historical Operation Module"
      sizeGB: 1
